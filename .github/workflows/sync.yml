name: Sync Lark Projects

on:
  repository_dispatch:
    types: [lark-sync]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install axios dotenv

      - name: Run sync script
        env:
          LARK_APP_ID:     ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          LARK_APP_TOKEN:  ${{ secrets.LARK_APP_TOKEN }}
          LARK_TABLE_ID:   ${{ secrets.LARK_TABLE_ID }}
        run: node sync.js

      - name: Commit updated projects.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/projects.json
          git diff --staged --quiet || git commit -m "chore: sync from Lark [skip ci]"
          git push
